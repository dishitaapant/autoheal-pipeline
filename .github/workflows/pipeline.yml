name: AutoHeal CI Pipeline

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      simulate_failure:
        description: "Simulate a specific failure type for testing"
        required: false
        default: "none"
        type: choice
        options: [none, dependency_error, test_failure, build_error, timeout]

env:
  AUTOHEAL_WEBHOOK_URL: ${{ secrets.AUTOHEAL_WEBHOOK_URL }}
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ─── Build & Test ──────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # ── Simulate failure if requested ──────────────────────────────────────
      - name: Simulate dependency error
        if: github.event.inputs.simulate_failure == 'dependency_error'
        run: |
          echo "Simulating ModuleNotFoundError..."
          python -c "import nonexistent_package"

      - name: Simulate test failure
        if: github.event.inputs.simulate_failure == 'test_failure'
        run: |
          echo "Simulating test failure..."
          python -c "
          import sys
          print('Running tests...')
          print('FAILED tests/test_api.py::test_create_user - AssertionError: assert 422 == 201')
          print('FAILED tests/test_api.py::test_get_user - AssertionError: assert 404 == 200')
          print('2 failed, 1 passed in 3.14s')
          sys.exit(1)
          "

      - name: Simulate build error
        if: github.event.inputs.simulate_failure == 'build_error'
        run: |
          echo "Simulating build error..."
          python -c "
          import sys
          print('Build failed: SyntaxError: invalid syntax at line 42')
          sys.exit(1)
          "

      # ── Real build steps ───────────────────────────────────────────────────
      - name: Install backend dependencies
        if: github.event.inputs.simulate_failure == 'none' || github.event.inputs.simulate_failure == ''
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Lint backend (ruff)
        if: github.event.inputs.simulate_failure == 'none' || github.event.inputs.simulate_failure == ''
        run: |
          pip install ruff || true
          cd backend && ruff check . --select E,F --ignore E501 || true

      - name: Install frontend dependencies
        if: github.event.inputs.simulate_failure == 'none' || github.event.inputs.simulate_failure == ''
        run: |
          cd frontend
          npm ci --prefer-offline

      - name: Build frontend
        if: github.event.inputs.simulate_failure == 'none' || github.event.inputs.simulate_failure == ''
        run: |
          cd frontend
          npm run build

      - name: Run backend tests
        if: github.event.inputs.simulate_failure == 'none' || github.event.inputs.simulate_failure == ''
        run: |
          pip install pytest httpx || true
          cd backend
          python -m pytest tests/ -v --tb=short 2>/dev/null || echo "No tests found"

      - name: Success notification
        if: success()
        run: echo "✅ Pipeline passed successfully"

  # ─── Notify AutoHeal on failure ───────────────────────────────────────────
  notify-autoheal:
    name: Notify AutoHeal
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: failure() && vars.AUTOHEAL_WEBHOOK_URL != ''

    steps:
      - name: Collect failure logs
        id: logs
        run: |
          LOG_SNIPPET="Pipeline failed on run ${{ github.run_id }}.
          Workflow: ${{ github.workflow }}
          Job: build-and-test
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Actor: ${{ github.actor }}
          Triggered by: ${{ github.event_name }}
          Failure reason: See GitHub Actions logs for full details."
          echo "log_snippet<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG_SNIPPET" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send webhook to AutoHeal backend
        run: |
          curl -s -X POST "${{ vars.AUTOHEAL_WEBHOOK_URL }}/api/webhook/pipeline-failure" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Token: ${{ secrets.AUTOHEAL_API_KEY }}" \
            -d '{
              "run_id": "${{ github.run_id }}",
              "repo": "${{ github.repository }}",
              "branch": "${{ github.ref_name }}",
              "commit_sha": "${{ github.sha }}",
              "workflow_name": "${{ github.workflow }}",
              "job_name": "build-and-test",
              "status": "failure",
              "actor": "${{ github.actor }}",
              "logs": ${{ toJSON(steps.logs.outputs.log_snippet) }},
              "metadata": {
                "run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                "event": "${{ github.event_name }}"
              }
            }' \
            --max-time 10 \
            --retry 3 \
            || echo "AutoHeal webhook call failed (non-blocking)"
