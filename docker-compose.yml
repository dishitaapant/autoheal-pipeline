version: "3.9"

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: autoheal-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: autoheal
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autoheal-net

  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autoheal-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      DB_NAME: autoheal
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      MAX_RETRIES: ${MAX_RETRIES:-3}
      RETRY_BASE_DELAY: ${RETRY_BASE_DELAY:-2.0}
      MODEL_PATH: /app/data/autoheal_model.pkl
    volumes:
      - model_data:/app/data
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - autoheal-net

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: autoheal-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - autoheal-net

volumes:
  mongo_data:
  model_data:

networks:
  autoheal-net:
    driver: bridge
